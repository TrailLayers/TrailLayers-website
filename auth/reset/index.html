<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset your password — TrailLayers</title>
  <meta name="description" content="Opening TrailLayers to reset your password.">
  <link rel="icon" type="image/png" href="../../assets/traillayers-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles.css">
  <style>
    .auth-shell {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem 1rem;
    }

    .auth-card {
      width: min(100%, 26rem);
      padding: 2.4rem 2rem;
      border-radius: 2rem;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.75);
      box-shadow: 0 22px 60px rgba(17, 37, 53, 0.14);
      text-align: center;
    }

    .auth-icon {
      width: 4rem;
      height: 4rem;
      border-radius: 1.1rem;
      margin: 0 auto 1.25rem;
    }

    .auth-card h1 {
      font-size: 1.5rem;
      margin: 0 0 0.6rem;
      letter-spacing: -0.03em;
    }

    .auth-card p {
      margin: 0 0 1.8rem;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.96rem;
    }

    .spinner {
      display: inline-block;
      width: 1.1rem;
      height: 1.1rem;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .divider {
      margin: 1.5rem 0;
      border: none;
      border-top: 1px solid var(--line);
    }

    .fallback-note {
      font-size: 0.85rem;
      color: var(--muted);
      margin: 0 0 1rem !important;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="auth-shell">
      <a class="brand" href="https://traillayers.app" aria-label="TrailLayers home">
        <img src="../../assets/traillayers-icon.png" alt="TrailLayers app icon">
        <span>TrailLayers</span>
      </a>

      <div class="auth-card">
        <img class="auth-icon" src="../../assets/traillayers-icon.png" alt="">

        <h1>Reset your password</h1>
        <p>
          If the app didn't open automatically, tap the button below to continue
          in TrailLayers.
        </p>

        <a class="button button-primary" href="#" id="open-app-btn" style="width:100%;margin-bottom:0.75rem;">
          <span class="spinner"></span> Opening TrailLayers&hellip;
        </a>

        <hr class="divider">

        <p class="fallback-note">Don't have the app yet?</p>
        <a
          class="button button-secondary"
          href="https://apps.apple.com/app/traillayers/id0000000000"
          style="width:100%;"
        >
          Download on the App Store
        </a>
      </div>
    </div>
  </div>

  <script>
    // Pass the full URL (including fragment / query params from Supabase) through
    // to the custom scheme so the app can parse the PKCE code even if Universal
    // Links didn't trigger (e.g. user opened in Safari from Mail).
    (function () {
      var params = window.location.search + window.location.hash;
      var deepLink = 'traillayers://reset-password' + params;
      document.getElementById('open-app-btn').href = deepLink;
      // Attempt to open automatically after a brief moment.
      setTimeout(function () { window.location.href = deepLink; }, 400);
    })();
  </script>
</body>
</html>
